services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fieldintel
      POSTGRES_PASSWORD: fieldintel
      POSTGRES_DB: fieldintel
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fieldintel -d fieldintel"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
